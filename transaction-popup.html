<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaiSign - Transaction Details</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 400px;
      min-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    
    .logo {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    
    .subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin: 4px 0 0 0;
    }
    
    .content {
      padding: 20px;
      flex: 1;
    }
    
    .transaction-type {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .transaction-type.eip7702 {
      background: rgba(255,183,77,0.2);
      border: 2px solid rgba(255,183,77,0.5);
    }
    
    .section {
      margin-bottom: 24px;
    }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    
    .field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .field:last-child {
      border-bottom: none;
    }
    
    .field-label {
      font-size: 13px;
      opacity: 0.8;
      flex-shrink: 0;
      margin-right: 12px;
    }
    
    .field-value {
      font-size: 13px;
      font-family: monospace;
      text-align: right;
      word-break: break-all;
      max-width: 250px;
    }
    
    .address {
      font-size: 11px;
    }
    
    .auth-list {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 6px;
      margin-top: 8px;
    }
    
    .auth-item {
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .auth-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    
    .footer {
      padding: 20px;
      border-top: 1px solid rgba(255,255,255,0.2);
      text-align: center;
    }
    
    .close-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    
    .close-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    
    .json-section {
      margin-top: 20px;
    }
    
    .json-content {
      background: rgba(0,0,0,0.2);
      padding: 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔍</div>
    <h1 class="title">KaiSign</h1>
    <p class="subtitle">Transaction Inspector</p>
  </div>
  
  <div class="content">
    <div id="transaction-type" class="transaction-type">
      <div id="type-icon">📝</div>
      <div id="type-title">Transaction Detected</div>
    </div>
    
    <div class="section">
      <div class="section-title">Basic Information</div>
      <div class="field">
        <span class="field-label">Method:</span>
        <span class="field-value" id="method">-</span>
      </div>
      <div class="field">
        <span class="field-label">To:</span>
        <span class="field-value address" id="to">-</span>
      </div>
      <div class="field">
        <span class="field-label">From:</span>
        <span class="field-value address" id="from">-</span>
      </div>
      <div class="field">
        <span class="field-label">Value:</span>
        <span class="field-value" id="value">-</span>
      </div>
      <div class="field">
        <span class="field-label">Gas:</span>
        <span class="field-value" id="gas">-</span>
      </div>
    </div>
    
    <div id="eip7702-section" class="section" style="display: none;">
      <div class="section-title">🚀 EIP-7702 Authorization List</div>
      <div id="auth-list" class="auth-list"></div>
    </div>
    
    <div class="json-section">
      <div class="section-title">Raw Transaction Data</div>
      <div id="json-content" class="json-content"></div>
    </div>
  </div>
  
  <div class="footer">
    <button class="close-btn" onclick="window.close()">Close</button>
  </div>

  <script>
    // Get transaction data from URL parameters
    function getTransactionData() {
      const urlParams = new URLSearchParams(window.location.search);
      const data = urlParams.get('data');
      if (data) {
        try {
          return JSON.parse(decodeURIComponent(data));
        } catch (error) {
          console.error('Error parsing transaction data:', error);
        }
      }
      return null;
    }
    
    // Display transaction data
    function displayTransaction(transactionData) {
      if (!transactionData) {
        document.getElementById('json-content').textContent = 'No transaction data available';
        return;
      }
      
      const tx = transactionData.transaction || transactionData;
      
      // Update type indicator
      const isEIP7702 = tx.isEIP7702;
      if (isEIP7702) {
        document.getElementById('transaction-type').classList.add('eip7702');
        document.getElementById('type-icon').textContent = '🚀';
        document.getElementById('type-title').textContent = 'EIP-7702 Transaction';
      }
      
      // Update basic fields
      document.getElementById('method').textContent = transactionData.method || 'eth_sendTransaction';
      document.getElementById('to').textContent = tx.to || '-';
      document.getElementById('from').textContent = tx.from || '-';
      document.getElementById('value').textContent = tx.value || '0x0';
      document.getElementById('gas').textContent = tx.gas || tx.gasLimit || '-';
      
      // Show EIP-7702 authorization list if present
      if (isEIP7702 && tx.authorizationList && tx.authorizationList.length > 0) {
        document.getElementById('eip7702-section').style.display = 'block';
        const authListEl = document.getElementById('auth-list');
        
        tx.authorizationList.forEach((auth, index) => {
          const authDiv = document.createElement('div');
          authDiv.className = 'auth-item';
          authDiv.innerHTML = `
            <div style="font-weight: 600; margin-bottom: 4px;">Authorization ${index + 1}</div>
            <div style="font-size: 11px; opacity: 0.8;">Address: ${auth.address || '-'}</div>
            <div style="font-size: 11px; opacity: 0.8;">Chain ID: ${auth.chainId || '-'}</div>
            <div style="font-size: 11px; opacity: 0.8;">Nonce: ${auth.nonce || '-'}</div>
          `;
          authListEl.appendChild(authDiv);
        });
      }
      
      // Show raw JSON
      document.getElementById('json-content').textContent = JSON.stringify(transactionData, null, 2);
    }
    
    // Initialize
    window.addEventListener('load', () => {
      const transactionData = getTransactionData();
      displayTransaction(transactionData);
      
      // Auto-close when MetaMask closes (optional)
      // You can remove this if you want it to stay open
      let checkInterval = setInterval(() => {
        if (window.chrome && window.chrome.runtime) {
          // Extension is still active
        } else {
          clearInterval(checkInterval);
        }
      }, 1000);
    });
    
    // Handle keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.close();
      }
    });
  </script>
</body>
</html>
