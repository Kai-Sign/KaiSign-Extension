<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 10px 0;
      color: #333;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px 0;
      width: 100%;
    }
    button:hover {
      background: #0056b3;
    }
    .info {
      padding: 10px;
      background: #f8f9fa;
      border-radius: 4px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>🔍 KaiSign</h1>
  
  <div class="info">
    <div>Transactions captured: <span id="count">0</span></div>
  </div>
  
  <button onclick="showTransactions()">View Transactions</button>
  <button onclick="clearTransactions()">Clear All</button>
  
  <script src="popup.js"></script>
</body>
</html>
