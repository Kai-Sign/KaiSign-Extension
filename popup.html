<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaiSign</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">KS</span>
      <span class="logo-text">KaiSign</span>
      <span class="tx-count-badge" id="txCount">0</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="refreshBtn" title="Refresh">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
          <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
        </svg>
      </button>
      <button class="btn-icon" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path fill-rule="evenodd" d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
          <path fill-rule="evenodd" d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Wallet Mode Toggle -->
  <div class="mode-toggle-section" id="modeSection">
    <div class="mode-toggle-header">
      <span class="mode-label">Wallet Mode</span>
      <span class="mode-status" id="modeStatus">Loading...</span>
    </div>
    <div class="mode-buttons">
      <button class="mode-btn active" id="modeEnhancer" title="Intercept MetaMask transactions">
        <svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">
          <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 13A6 6 0 1 1 8 2a6 6 0 0 1 0 12z"/>
          <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
        </svg>
        MetaMask Enhancer
      </button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrapper">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path fill-rule="evenodd" d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
    </svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Search...">
  </div>

  <!-- Transaction List -->
  <div class="tx-list-container">
    <div class="tx-list" id="txList">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- Action Bar -->
  <footer class="action-bar">
    <div class="export-menu">
      <button class="btn btn-primary" id="exportBtn">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
          <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
        </svg>
        Export
      </button>
      <div class="export-dropdown" id="exportDropdown">
        <button class="export-option" data-format="json">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path fill-rule="evenodd" d="M14 4.5V11h-1V4.5h-2A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v9H2V2a2 2 0 0 1 2-2h5.5L14 4.5zM4.151 15.29a1.176 1.176 0 0 1-.111-.449h.764a.578.578 0 0 0 .255.384c.07.049.153.087.249.114.095.028.202.041.319.041.164 0 .302-.023.413-.07a.559.559 0 0 0 .255-.193.507.507 0 0 0 .085-.29.387.387 0 0 0-.153-.326c-.101-.08-.256-.144-.463-.193l-.618-.143a1.72 1.72 0 0 1-.539-.214 1.001 1.001 0 0 1-.351-.367 1.068 1.068 0 0 1-.123-.524c0-.244.063-.457.19-.639.127-.181.303-.322.528-.422.224-.1.483-.149.776-.149.305 0 .564.05.779.152.214.102.38.239.498.41.118.17.18.354.187.551h-.79a.549.549 0 0 0-.162-.354.758.758 0 0 0-.283-.178 1.108 1.108 0 0 0-.389-.068.968.968 0 0 0-.38.066.556.556 0 0 0-.24.178.454.454 0 0 0-.08.258.428.428 0 0 0 .127.328c.086.074.207.133.363.178l.624.152a1.418 1.418 0 0 1 .567.247c.148.112.262.249.342.41.08.16.12.341.12.543 0 .26-.068.488-.203.684a1.3 1.3 0 0 1-.573.451c-.246.108-.535.162-.867.162-.354 0-.656-.058-.905-.172a1.37 1.37 0 0 1-.579-.478z"/>
          </svg>
          Export as JSON
        </button>
        <button class="export-option" data-format="csv">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path fill-rule="evenodd" d="M14 4.5V14a2 2 0 0 1-2 2h-1v-1h1a1 1 0 0 0 1-1V4.5h-2A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v9H2V2a2 2 0 0 1 2-2h5.5L14 4.5zM3.517 14.841a1.13 1.13 0 0 0 .401.823c.13.108.29.192.479.252.19.061.411.091.665.091.338 0 .624-.053.858-.158.237-.105.416-.252.54-.44a1.17 1.17 0 0 0 .187-.656c0-.224-.045-.41-.135-.56a1.001 1.001 0 0 0-.375-.357 2.027 2.027 0 0 0-.566-.21l-.621-.144a.97.97 0 0 1-.405-.176.37.37 0 0 1-.143-.299c0-.156.062-.284.185-.384.125-.101.296-.152.513-.152.143 0 .27.023.382.068a.645.645 0 0 1 .382.388h.764a1.446 1.446 0 0 0-.575-.78 1.845 1.845 0 0 0-.997-.27c-.294 0-.55.05-.768.152-.219.102-.389.244-.51.427a1.1 1.1 0 0 0-.181.636c0 .201.04.376.122.524.082.149.199.27.351.367.153.095.332.167.54.213l.618.144c.207.049.36.113.462.193a.387.387 0 0 1 .153.326.505.505 0 0 1-.085.29.559.559 0 0 1-.255.193c-.111.047-.249.07-.413.07a1.186 1.186 0 0 1-.568-.136.674.674 0 0 1-.282-.318h-.764z"/>
          </svg>
          Export as CSV
        </button>
      </div>
    </div>
    <button class="btn btn-secondary" id="importBtn">
      <svg viewBox="0 0 16 16" fill="currentColor">
        <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
        <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
      </svg>
      Import
    </button>
    <button class="btn btn-danger" id="clearBtn">
      <svg viewBox="0 0 16 16" fill="currentColor">
        <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
        <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
      </svg>
    </button>
  </footer>

  <!-- Import Modal -->
  <div class="modal-overlay" id="importModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Import Data</h3>
        <button class="modal-close" id="closeModal">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="file-drop" id="fileDrop">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
            <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
          </svg>
          <p>Drop JSON file here or click to browse</p>
          <p class="hint">Max file size: 5MB</p>
        </div>
        <input type="file" id="fileInput" accept=".json" style="display: none;">
        <div class="import-options">
          <div class="import-option">
            <input type="radio" name="importMode" id="importReplace" value="replace" checked>
            <label for="importReplace">Replace existing data</label>
          </div>
          <div class="import-option">
            <input type="radio" name="importMode" id="importMerge" value="merge">
            <label for="importMerge">Merge with existing data</label>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelImport">Cancel</button>
        <button class="btn btn-primary" id="confirmImport" disabled>Import</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="txDetailModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3 class="modal-title" id="txDetailTitle">Transaction Details</h3>
        <button class="modal-close" id="closeDetailModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="detail-grid" id="txDetailGrid"></div>
        <div class="detail-section">
          <div class="detail-section-title">Decoded Summary</div>
          <div class="detail-card" id="txDetailSummary"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Raw Data</div>
          <pre class="detail-code" id="txDetailRaw"></pre>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Full Record</div>
          <pre class="detail-code" id="txDetailJson"></pre>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="copyRawBtn">Copy Raw</button>
        <button class="btn btn-secondary" id="copyJsonBtn">Copy Full JSON</button>
        <button class="btn btn-primary" id="closeDetailModalBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
